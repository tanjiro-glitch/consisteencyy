  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --card: #212121;
      --border: #333;
      --accent: #FF6B35;
      --accent-glow: #FF8E53;
      --text: #F5F5F5;
      --text-muted: #B0B0B0;
      --success: #10B981;
      --gradient: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Performance: Noise texture optimized */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(255,107,53,0.03) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(247,147,30,0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 999;
    }

    .container { 
      max-width: 400px; 
      margin: 0 auto; 
      padding: 20px 16px 80px; 
    }

    /* Header - Improved spacing */
    header {
      text-align: center;
      padding: 32px 0;
      animation: slideDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 8vw, 48px);
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255,107,53,0.3);
    }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Progress bar - Better mobile spacing */
    .progress-track {
      margin: 40px 0 0;
      display: flex;
      gap: 8px;
      padding: 0 8px;
    }

    .progress-step {
      height: 4px;
      flex: 1;
      background: var(--border);
      border-radius: 4px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .progress-step.active {
      background: var(--accent);
      box-shadow: 0 0 12px rgba(255,107,53,0.4);
    }

    .progress-step.done { 
      background: var(--success); 
    }

    /* Screens - Better animations */
    .screen { 
      display: none; 
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .screen.active { 
      display: block; 
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typography - Better hierarchy */
    .screen-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 7vw, 40px);
      line-height: 1.1;
      margin: 40px 0 12px;
      letter-spacing: 1px;
    }

    .screen-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    /* Forms - Better spacing & focus states */
    .input-group { 
      margin-bottom: 28px; 
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="number"], input[type="text"], select {
      width: 100%;
      background: var(--card);
      border: 2px solid transparent;
      color: var(--text);
      padding: 16px 20px;
      font-size: 16px;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
      transform: translateY(-1px);
    }

    /* Option cards - Better hover & selection */
    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .option-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .option-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(255,107,53,0.15);
    }

    .option-card:hover::before {
      transform: scaleX(1);
    }

    .option-card.selected {
      border-color: var(--accent);
      background: rgba(255,107,53,0.08);
      box-shadow: 0 0 0 4px rgba(255,107,53,0.2);
    }

    .option-card .icon { 
      font-size: 28px; 
      margin-bottom: 12px; 
    }

    .option-card .label { 
      font-size: 14px; 
      font-weight: 600; 
      margin-bottom: 4px;
    }

    .option-card .sub { 
      font-size: 12px; 
      color: var(--text-muted); 
    }

    /* Buttons - Better CTAs */
    .btn {
      width: 100%;
      background: var(--gradient);
      color: #000;
      border: none;
      padding: 18px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 12px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(255,107,53,0.3);
    }

    .btn:active { 
      transform: translateY(0); 
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
      margin-top: 12px;
    }

    .btn-outline:hover { 
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 10px 25px rgba(255,107,53,0.2);
    }

    /* Error messages */
    .error-msg {
      color: #EF4444;
      font-size: 13px;
      margin: 12px 0;
      display: none;
      font-weight: 500;
      background: rgba(239,68,68,0.1);
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #EF4444;
    }

    /* Results - Better visual hierarchy */
    .result-header {
      background: linear-gradient(135deg, var(--surface) 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      margin: 32px 0 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .result-header::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0.1;
    }

    .result-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .stat-box {
      background: rgba(255,107,53,0.05);
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .stat-label { 
      font-size: 11px; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Sections - Better collapsible */
    .section {
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .section-header {
      background: var(--card);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
    }

    .section-header:hover {
      background: rgba(255,107,53,0.05);
    }

    .section-icon { 
      font-size: 20px; 
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .section-arrow {
      color: var(--text-muted);
      transition: transform 0.3s ease;
      font-size: 14px;
    }

    .section.open .section-arrow { 
      transform: rotate(180deg); 
    }

    .section-body {
      display: none;
      padding: 24px;
      background: var(--surface);
      animation: expand 0.3s ease;
    }

    .section.open .section-body { 
      display: block; 
    }

    @keyframes expand {
      from { opacity: 0; height: 0; }
      to { opacity: 1; height: auto; }
    }

    /* Content blocks */
    .day-block { 
      margin-bottom: 24px; 
    }

    .day-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
      font-weight: 600;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,107,53,0.3);
    }

    .exercise-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .exercise-row:last-child { 
      border-bottom: none; 
    }

    .ex-name { 
      font-size: 15px; 
      font-weight: 500; 
    }

    .ex-sets {
      font-size: 13px;
      color: var(--accent);
      background: rgba(255,107,53,0.15);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Meal blocks */
    .meal-block { 
      margin-bottom: 20px; 
    }

    .meal-time {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .meal-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .meal-item:last-child { 
      border-bottom: none; 
    }

    .meal-cal { 
      color: var(--text-muted); 
      font-size: 13px; 
    }

    /* Tips */
    .tip-item {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      line-height: 1.6;
    }

    .tip-item:last-child { 
      border-bottom: none; 
    }

    .tip-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--accent);
      min-width: 28px;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* Macros */
    .macro-row { 
      margin-bottom: 16px; 
    }

    .macro-label { 
      display: flex; 
      justify-content: space-between; 
      font-size: 14px; 
      margin-bottom: 8px; 
    }

    .macro-val { 
      color: var(--accent); 
      font-weight: 600; 
    }

    .macro-bar { 
      height: 8px; 
      background: var(--border); 
      border-radius: 4px; 
      overflow: hidden; 
    }

    .macro-fill { 
      height: 100%; 
      border-radius: 4px; 
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
    }
